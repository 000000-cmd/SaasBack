# =====================================================================
# PROFILE: DEV
# Para trabajar contra el servidor remoto de desarrollo.
# Activacion: SPRING_PROFILES_ACTIVE=dev
#
# IMPORTANTE: actualiza DEV_DB_HOST / DEV_EUREKA_HOST / DEV_REDIS_HOST
# cuando el servidor remoto este disponible.
# =====================================================================

# ---------------------------------------------------------------------
# Base de datos remota
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://${DEV_DB_HOST:dev-server}:${DEV_DB_PORT:3306}/${DEV_DB_NAME:saas_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota
spring.datasource.username=${DEV_DB_USER:root}
spring.datasource.password=${DEV_DB_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------------------------
# Eureka remoto
# ---------------------------------------------------------------------
eureka.client.service-url.defaultZone=http://${DEV_EUREKA_HOST:dev-server}:${DEV_EUREKA_PORT:8761}/eureka/

# ---------------------------------------------------------------------
# Redis remoto
# ---------------------------------------------------------------------
spring.data.redis.host=${DEV_REDIS_HOST:dev-server}
spring.data.redis.port=${DEV_REDIS_PORT:6379}

# ---------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------
spring.jpa.show-sql=false
logging.level.com.saas=INFO

# ---------------------------------------------------------------------
# CORS dev: orígenes permitidos. Sobrescribe con DEV_CORS_ORIGINS al desplegar.
# Acepta patrones (https://*.tu-dominio.com).
# ---------------------------------------------------------------------
saas.cors.allowed-origins=${DEV_CORS_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://dev-server:4200}
