server.port=8085

# El gateway pasa el path tal cual; Spring Boot lo despoja antes del @RequestMapping.
server.servlet.context-path=/search

# ---------------------------------------------------------------------
# search-service NO usa MySQL. Excluimos la auto-config de JPA y DataSource
# para que Spring Boot no se queje de no encontrar URL de BD.
# (saas-common las trae transitivamente, pero aqui no las activamos).
# ---------------------------------------------------------------------
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

# ---------------------------------------------------------------------
# Outbox: search-service NO ejecuta OutboxRelay (solo CONSUME de Kafka).
# El relay se desactiva via @ConditionalOnProperty.
# ---------------------------------------------------------------------
saas.outbox.relay-enabled=false

# search-service va a consumir, no producir, entonces se desactiva el kafka.
saas.kafka.enabled=false

saas.jpa.auditing-enabled=false

# ---------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------
logging.level.org.springframework.security=INFO


# ---------------------------------------------------------------------
# Kafka consumer config
# ---------------------------------------------------------------------
# Brokers (sobreescritos por profile local/docker)
# spring.kafka.bootstrap-servers ya viene de application-local/docker.properties

# Consumer group: identifica al "equipo" que se reparte particiones.
# Si en el futuro corres 3 instancias de search-service, las 12 particiones
# de domain.events se reparten entre las 3 (4 cada una).
spring.kafka.consumer.group-id=search-indexer

# auto-offset-reset: si es la primera vez que el consumer group se conecta,
# desde donde empieza a leer.
#   earliest = desde el primer mensaje del topic (replay completo)
#   latest   = solo mensajes futuros (ignora historico)
# Para indexer queremos earliest: necesitamos procesar TODO desde el inicio.
spring.kafka.consumer.auto-offset-reset=earliest

# Manual ack: NO confirmar ofssset automaticamente. El consumer confirma
# solo cuando termino de procesar correctamente. Si falla, Kafka lo reentrega.
spring.kafka.consumer.enable-auto-commit=false

# Cuantos mensajes leer en cada poll (batch interno del cliente)
spring.kafka.consumer.max-poll-records=100

# Cuanto tarda Kafka en considerar muerto al consumer si no manda heartbeats
spring.kafka.consumer.properties.session.timeout.ms=30000

# Deserializadores: como interpretar los bytes de la red.
# Como producer escribio strings, consumer lee strings.
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Listener: ack manual + threads concurrentes
# concurrency=3 = 3 threads del listener procesando en paralelo (uno por particion?)
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.listener.concurrency=3

saas.outbox.publisher-enabled=false

# ---------------------------------------------------------------------
# Reindex on Startup
# ---------------------------------------------------------------------
# Si true, al arrancar reindexa desde MySQL via Feign a auth/system.
# Default: false (no se reindexa automaticamente).
#
# se necesita (cambiar property + reiniciar). Despues volver a false.
saas.search.reindex.enabled=true

saas.search.reindex.entities=all