server.port=8083

# ---------------------------------------------------------------------
# System-service NO ejecuta Flyway (lo hace auth-service).
# Solo valida que sus entidades JPA coincidan con el schema.
# ---------------------------------------------------------------------
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=validate

# ---------------------------------------------------------------------
# Cache
# ---------------------------------------------------------------------
spring.cache.type=none

# ---------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------
logging.level.org.springframework.security=INFO
