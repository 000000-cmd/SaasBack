server.port=8083

# ---------------------------------------------------------------------
# Prefijo publico del servicio. Estandar: toda URL del back arranca con
# /<microservicio> para que el front (y los logs) sepan a quien apunta
# sin tener que mirar la ruta concreta. El gateway pasa el path tal cual,
# Spring Boot lo despoja antes de matchear @RequestMapping. Aplica
# tambien a las llamadas S2S por Feign a /system/internal/**.
# ---------------------------------------------------------------------
server.servlet.context-path=/system

# ---------------------------------------------------------------------
# System-service NO ejecuta Flyway (lo hace auth-service).
# Solo valida que sus entidades JPA coincidan con el schema.
# ---------------------------------------------------------------------
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=validate

# ---------------------------------------------------------------------
# Distribucion del APK: el binario se guarda en disco; la metadata en BD.
# Los APK rondan 30-80MB -> limites de multipart holgados.
# ---------------------------------------------------------------------
app.apk.storage-dir=./storage/apk
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=210MB

# ---------------------------------------------------------------------
# Cache
# ---------------------------------------------------------------------
spring.cache.type=none

# ---------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------
logging.level.org.springframework.security=INFO
