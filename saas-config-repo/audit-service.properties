server.port=8087

# Prefijo publico del servicio (el gateway enruta /audit/** aqui).
server.servlet.context-path=/audit

# ---------------------------------------------------------------------
# Persistencia: ESQUEMA DEDICADO saas_audit (aisla auditoria de la BD operativa).
# application*.properties). audit-service gobierna su propia BD con Flyway
# (init-scripts solo crea la BD vacia saas_audit).
# ---------------------------------------------------------------------
# Datasource dedicado: BD propia saas_audit (override a nivel de servicio para
# que gane sobre application-{profile}). createDatabaseIfNotExist crea la BD si
# init-scripts no corrio (volumen preexistente). Host: localhost por defecto,
# 'mysql' en docker via SAAS_DB_HOST.
spring.datasource.url=jdbc:mysql://${SAAS_DB_HOST:localhost}:3306/saas_audit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&createDatabaseIfNotExist=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-version=0: si saas_audit no estuviera vacío, Flyway baseliza en 0 y
# AÚN aplica V1 (evita el caso clásico en que baseline=1 se "come" la V1 y
# nunca crea audit_log).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate

# Este servicio no usa la auditoria JPA (createdAt se setea a mano).
saas.jpa.auditing-enabled=false

# ---------------------------------------------------------------------
# Outbox: audit-service solo CONSUME. No produce ni relaya.
# ---------------------------------------------------------------------
saas.outbox.relay-enabled=false
saas.outbox.publisher-enabled=false
saas.kafka.enabled=false

# ---------------------------------------------------------------------
# Kafka consumer: grupo PROPIO para no competir con otros consumidores.
# Lee el topic dedicado de auditoria.
# ---------------------------------------------------------------------
saas.outbox.audit-topic=audit.events
spring.kafka.consumer.group-id=audit-recorder
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.max-poll-records=100
spring.kafka.consumer.properties.session.timeout.ms=30000
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.listener.concurrency=3

# ---------------------------------------------------------------------
# Cache / Logging
# ---------------------------------------------------------------------
spring.cache.type=none
logging.level.org.springframework.security=INFO
