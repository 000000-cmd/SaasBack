# =====================================================================
# CONFIGURACION GLOBAL (compartida por todos los microservicios)
# Los datasource y hosts dependientes del ambiente se definen en
# application-{local|dev|prod}.properties
# Por defecto el cliente arranca con profile=local
# =====================================================================

# ---------------------------------------------------------------------
# JPA estandar (cada servicio decide ddl-auto en su propio archivo)
# ---------------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
# Mantener nombres tal cual los declara la entidad (PascalCase). Sin esto,
# Hibernate convertiria CamelCase -> snake_case automaticamente.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# ---------------------------------------------------------------------
# Eureka (defaults; cada profile lo sobrescribe segun ambiente)
# ---------------------------------------------------------------------
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${spring.application.name}
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

# ---------------------------------------------------------------------
# JWT (compartido)
# ---------------------------------------------------------------------
jwt.secret=${JWT_SECRET:SuperClaveUltraSeguraDe32Caracteres1234}
jwt.expirationMs=${JWT_EXPIRATION_MS:3600000}
jwt.refreshTokenExpirationMs=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ---------------------------------------------------------------------
# Redis (rate-limit en gateway, JWT blacklist en auth)
# ---------------------------------------------------------------------
spring.data.redis.timeout=2000

# ---------------------------------------------------------------------
# Logging y formato
# ---------------------------------------------------------------------
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
spring.jackson.time-zone=America/Bogota
spring.jackson.locale=es_CO
spring.jackson.default-property-inclusion=non_null

# ---------------------------------------------------------------------
# Actuator
# ---------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


# ---------------------------------------------------------------------
# Kafka + Outbox
# ---------------------------------------------------------------------
saas.kafka.enabled=true
saas.outbox.topic=domain.events
saas.outbox.relay-enabled=true
saas.outbox.poll-delay-ms=2000
saas.outbox.batch-size=100
saas.outbox.max-retries=5
