# =====================================================================
# FINANCE-SERVICE · PERFIL LOCAL
# Override de datasource a la BD DEDICADA saas_finance.
#
# Por que este archivo y no finance-service.properties:
#   En Spring Cloud Config, una propiedad en un archivo *profile-specific*
#   (application-local.properties) gana sobre un archivo de servicio SIN perfil
#   (finance-service.properties). Sin este override el datasource caeria en
#   saas_db. Este archivo es service + profile => maxima precedencia y gana
#   siempre.
# =====================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/saas_finance?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&createDatabaseIfNotExist=true
