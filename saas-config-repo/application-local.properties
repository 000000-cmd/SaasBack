# =====================================================================
# PROFILE: LOCAL  (default)
# Para trabajar contra MySQL/Redis corriendo en tu maquina (localhost).
# Activacion: SPRING_PROFILES_ACTIVE=local  (o sin variable, es el default)
# =====================================================================

# ---------------------------------------------------------------------
# Base de datos
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/saas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------------------------
# Eureka (apuntando al discovery local)
# ---------------------------------------------------------------------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# CRITICO en local: el servicio se debe registrar en Eureka como "localhost",
# no como ${spring.application.name} (que es lo que dice el global). Sin esto,
# Feign de auth -> system construye URLs http://system-service:8083/... y
# Windows no resuelve ese hostname (UnknownHostException).
# En Docker, el global se mantiene (los hostnames de contenedor SI resuelven
# via DNS interno de Docker).
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

# ---------------------------------------------------------------------
# Redis local
# ---------------------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ---------------------------------------------------------------------
# Logging mas verbose en local
# ---------------------------------------------------------------------
spring.jpa.show-sql=false
logging.level.com.saas=DEBUG


saas.gateway.services.auth-uri=http://localhost:8082
saas.gateway.services.system-uri=http://localhost:8083

# ---------------------------------------------------------------------
# CORS local: orígenes del front en desarrollo (Angular dev server, etc.)
# ---------------------------------------------------------------------
saas.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,http://localhost:3000,http://localhost:5173

# Kafka brokers (puertos externos del cluster local)
spring.kafka.bootstrap-servers=localhost:9094,localhost:9095,localhost:9096
