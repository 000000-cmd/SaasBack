# =====================================================================
# PROFILE: LOCAL  (default)
# Para trabajar contra MySQL/Redis corriendo en tu maquina (localhost).
# Activacion: SPRING_PROFILES_ACTIVE=local  (o sin variable, es el default)
# =====================================================================

# ---------------------------------------------------------------------
# Base de datos
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/saas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------------------------
# Eureka (apuntando al discovery local)
# ---------------------------------------------------------------------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ---------------------------------------------------------------------
# Redis local
# ---------------------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ---------------------------------------------------------------------
# Logging mas verbose en local
# ---------------------------------------------------------------------
spring.jpa.show-sql=true
logging.level.com.saas=DEBUG
