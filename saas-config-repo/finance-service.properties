server.port=8088

# ---------------------------------------------------------------------
# Prefijo publico del servicio. Estandar: toda URL del back arranca con
# /<microservicio> para que el front (y los logs) sepan a quien apunta
# sin tener que mirar la ruta concreta. El gateway pasa el path tal cual,
# Spring Boot lo despoja antes de matchear @RequestMapping. Aplica
# tambien a las llamadas S2S por Feign a /finance/internal/**.
# ---------------------------------------------------------------------
server.servlet.context-path=/finance

# ---------------------------------------------------------------------
# Persistencia: ESQUEMA DEDICADO saas_finance (aisla lo financiero de la
# BD operativa saas_db). finance-service gobierna su propia BD con Flyway
# (init-scripts solo crea la BD vacia saas_finance).
#
# El datasource concreto se define en finance-service-{local|docker}.properties
# (service + profile => maxima precedencia sobre application-{profile}).
# ---------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-version=0: si saas_finance no estuviera vacio, Flyway baseliza en 0
# y AUN aplica V1 (evita que baseline=1 se "coma" la V1).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# JPA en modo validate (Flyway gestiona el DDL, Hibernate solo valida)
spring.jpa.hibernate.ddl-auto=validate

# ---------------------------------------------------------------------
# Outbox / Kafka: finance-service es PRODUCTOR. Corre el OutboxRelay y
# publica al topic global de dominio (defaults heredados del global).
# ---------------------------------------------------------------------
saas.outbox.relay-enabled=true
saas.kafka.enabled=true

# ---------------------------------------------------------------------
# Cache / Logging
# ---------------------------------------------------------------------
spring.cache.type=none
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=DEBUG
