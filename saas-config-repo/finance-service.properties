server.port=8088

# ---------------------------------------------------------------------
# Prefijo publico del servicio. Estandar: toda URL del back arranca con
# /<microservicio>. El gateway pasa el path tal cual; Spring lo despoja al
# matchear los controllers. Aplica tambien a las S2S /finance/internal/**.
# ---------------------------------------------------------------------
server.servlet.context-path=/finance

# ---------------------------------------------------------------------
# Persistencia: POR AHORA finance comparte la BD operativa saas_db (no hay
# esquema dedicado todavia). Hereda el datasource de application-{profile}
# (igual que business/thirdparty). auth-service es el lider de Flyway sobre
# saas_db; finance NO ejecuta migraciones, solo valida que sus entidades
# (compensaciones + outbox) coincidan con el schema ya creado.
# ---------------------------------------------------------------------
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=validate

# ---------------------------------------------------------------------
# Outbox / Kafka: finance es PRODUCTOR (creditos, pagos, etc. a futuro).
# Escribe en outbox_event (saas_db) y el OutboxRelay lo publica a Kafka.
# relay-enabled / kafka.enabled se heredan del global (true).
# ---------------------------------------------------------------------

# ---------------------------------------------------------------------
# Cache / Logging
# ---------------------------------------------------------------------
spring.cache.type=none
logging.level.org.springframework.security=INFO
