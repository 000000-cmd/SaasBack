server.port=8099

# ---------------------------------------------------------------------
# Prefijo publico del servicio (estandar: toda URL arranca con /<micro>).
# El gateway pasa el path tal cual; Spring lo despoja al matchear controllers.
# ---------------------------------------------------------------------
server.servlet.context-path=/thirdparty

# ---------------------------------------------------------------------
# Thirdparty-service NO ejecuta Flyway (lo hace auth-service).
# Solo valida que sus entidades JPA coincidan con el schema.
# ---------------------------------------------------------------------
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=validate

# ---------------------------------------------------------------------
# Cache
# ---------------------------------------------------------------------
spring.cache.type=none

# ---------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------
logging.level.org.springframework.security=INFO
