server.port=8082

# ---------------------------------------------------------------------
# Auth-service es el servicio "lider" del schema:
# ejecuta las migraciones Flyway al arranque.
# ---------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# JPA en modo validate (Flyway gestiona el DDL, Hibernate solo valida)
spring.jpa.hibernate.ddl-auto=validate

# ---------------------------------------------------------------------
# Cache (Caffeine en memoria). Usamos Caffeine directo en
# RoleResolverFeignAdapter; aqui solo dejamos el provider listo por si
# algun servicio futuro usa @Cacheable.
# ---------------------------------------------------------------------
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=5m

# ---------------------------------------------------------------------
# Datos para inicializacion del usuario admin (DataInitializer crea
# el admin si no existe; password se cifra con BCrypt en runtime).
# ---------------------------------------------------------------------
saas.bootstrap.admin.username=admin
saas.bootstrap.admin.email=admin@saas.local
saas.bootstrap.admin.password=Admin123!
saas.bootstrap.admin.first-name=Administrador
saas.bootstrap.admin.last-name=Sistema

# ---------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
