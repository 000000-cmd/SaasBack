# =====================================================================
# AUDIT-SERVICE · PERFIL LOCAL
# Override de datasource a la BD DEDICADA saas_audit.
#
# Por qué este archivo y no audit-service.properties:
#   En Spring Cloud Config, una propiedad en un archivo *profile-specific*
#   (application-local.properties) gana sobre un archivo de servicio SIN perfil
#   (audit-service.properties). Por eso el datasource caía en saas_db.
#   Este archivo es service + profile => máxima precedencia y gana siempre.
# =====================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/saas_audit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&createDatabaseIfNotExist=true
