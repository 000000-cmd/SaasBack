# =====================================================================
# PROFILE: DOCKER
# Usado SOLO cuando los servicios corren dentro de docker-compose
# (los hostnames son los nombres de los contenedores).
# Activacion: SPRING_PROFILES_ACTIVE=docker  (lo setea docker-compose.yml)
# =====================================================================

# ---------------------------------------------------------------------
# Base de datos (hostname = nombre del contenedor mysql)
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://mysql:3306/saas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------------------------
# Eureka (hostname = nombre del contenedor)
# ---------------------------------------------------------------------
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/

# ---------------------------------------------------------------------
# Redis (hostname = nombre del contenedor)
# ---------------------------------------------------------------------
spring.data.redis.host=redis
spring.data.redis.port=6379

# ---------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------
spring.jpa.show-sql=false
logging.level.com.saas=INFO
