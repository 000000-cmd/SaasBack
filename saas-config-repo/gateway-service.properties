server.port=8080

# ---------------------------------------------------------------------
# Gateway no usa BD ni JPA
# ---------------------------------------------------------------------
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ---------------------------------------------------------------------
# Rutas: usamos RouteConfig.java (rutas explicitas) en lugar del
# discovery locator. Asi las URLs publicas son LIMPIAS (/auth/login,
# /menus/me, etc.) sin prefijo de service-id.
# ---------------------------------------------------------------------
spring.cloud.gateway.server.webflux.discovery.locator.enabled=false

# ---------------------------------------------------------------------
# CORS (Spring Cloud Gateway 4.3 movio las keys a server.webflux.globalcors)
# ---------------------------------------------------------------------
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origin-patterns=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].exposed-headers=Authorization,X-User-Id,X-User-Username,X-User-Roles
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].max-age=3600

# ---------------------------------------------------------------------
# HTTP client
# ---------------------------------------------------------------------
spring.cloud.gateway.server.webflux.httpclient.connect-timeout=20000
spring.cloud.gateway.server.webflux.httpclient.response-timeout=30s
spring.cloud.gateway.server.webflux.httpclient.pool.type=elastic
spring.cloud.gateway.server.webflux.httpclient.pool.max-connections=500
spring.cloud.gateway.server.webflux.httpclient.pool.max-idle-time=30s

# ---------------------------------------------------------------------
# Rate limiting (con Redis). Defaults globales:
#   replenish-rate    -> tokens por segundo
#   burst-capacity    -> capacidad maxima del bucket
#   requested-tokens  -> costo por request (1 = normal)
# Las rutas concretas (login, etc.) configuran su propio bucket en codigo.
# ---------------------------------------------------------------------
saas.gateway.rate-limit.default.replenish-rate=20
saas.gateway.rate-limit.default.burst-capacity=40
saas.gateway.rate-limit.login.replenish-rate=2
saas.gateway.rate-limit.login.burst-capacity=5

# ---------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.saas.gatewayservice=DEBUG

# ---------------------------------------------------------------------
# Actuator
# ---------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,gateway
management.endpoint.health.show-details=always
# Spring Boot 3.5: management.endpoint.X.enabled fue reemplazado por .access
# Valores: unrestricted | read_only | none
management.endpoint.gateway.access=unrestricted


saas.gateway.services.auth-uri=lb://auth-service
saas.gateway.services.system-uri=lb://system-service
