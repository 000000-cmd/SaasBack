# ============================================
# DOCKER COMPOSE - SAAS PLATFORM
# Linea Base para Microservicios
# ============================================
# Optimizaciones:
# - Health checks con tiempos razonables
# - Dependencias correctas
# - Variables de entorno centralizadas
# - Logging configurado
# ============================================

services:

  # ===========================================
  # CAPA 1: BASE DE DATOS
  # ===========================================
  mysql:
    image: mysql:8.4
    container_name: saas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: ${TZ:-America/Bogota}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
      --innodb_buffer_pool_size=512M
      --innodb_log_file_size=128M
      --slow_query_log=1
      --long_query_time=2
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================
  # CAPA 1: REDIS (rate-limit gateway + JWT blacklist auth)
  # ===========================================
  redis:
    image: redis:7.4-alpine
    container_name: saas-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  # ===========================================
  # CAPA 1.5: KAFKA CLUSTER (3 brokers KRaft)
  # ===========================================
  kafka-1:
    image: confluentinc/cp-kafka:7.8.0
    container_name: saas-kafka-1
    restart: unless-stopped
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-1:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168       # 7 días
    ports:
      - "9094:9094"                         # acceso desde host (dev)
    volumes:
      - kafka_1_data:/var/lib/kafka/data
    networks: [saas-network]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  kafka-2:
    image: confluentinc/cp-kafka:7.8.0
    container_name: saas-kafka-2
    restart: unless-stopped
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9095"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-2:9092,EXTERNAL://localhost:9095"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports: ["9095:9095"]
    volumes:
      - kafka_2_data:/var/lib/kafka/data
    networks: [saas-network]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  kafka-3:
    image: confluentinc/cp-kafka:7.8.0
    container_name: saas-kafka-3
    restart: unless-stopped
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9096"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-3:9092,EXTERNAL://localhost:9096"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports: ["9096:9096"]
    volumes:
      - kafka_3_data:/var/lib/kafka/data
    networks: [saas-network]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Inicializa el topic principal cuando los 3 brokers estén listos
  kafka-init:
    image: confluentinc/cp-kafka:7.8.0
    container_name: saas-kafka-init
    depends_on:
      kafka-1: { condition: service_healthy }
      kafka-2: { condition: service_healthy }
      kafka-3: { condition: service_healthy }
    networks: [saas-network]
    command: |
      bash -c '
        kafka-topics --bootstrap-server kafka-1:9092 --create --if-not-exists \
          --topic domain.events \
          --partitions 12 \
          --replication-factor 3 \
          --config min.insync.replicas=2 \
          --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka-1:9092 --create --if-not-exists \
          --topic domain.events.dlq \
          --partitions 3 \
          --replication-factor 3
        kafka-topics --bootstrap-server kafka-1:9092 --list
      '
    restart: "no"

  # UI de Kafka — para dev/staging
  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: saas-kafdrop
    restart: unless-stopped
    ports: ["9000:9000"]
    environment:
      KAFKA_BROKERCONNECT: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
      JVM_OPTS: "-Xms64M -Xmx256M"
    depends_on:
      kafka-1: { condition: service_healthy }
    networks: [saas-network]


  # ===========================================
  # CAPA 1.5: ELASTICSEARCH CLUSTER (3 nodos)
  # ===========================================
  es-01:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: saas-es-01
    restart: unless-stopped
    environment:
      - node.name=es-01
      - cluster.name=saas-es-cluster
      - discovery.seed_hosts=es-02,es-03
      - cluster.initial_master_nodes=es-01,es-02,es-03
      - node.roles=master,data,ingest
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false             # dev: false. prod: true (ver sección Operaciones)
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms1g -Xmx1g}
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    volumes:
      - es_01_data:/usr/share/elasticsearch/data
    ports: ["9200:9200"]
    networks: [saas-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  es-02:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: saas-es-02
    restart: unless-stopped
    environment:
      - node.name=es-02
      - cluster.name=saas-es-cluster
      - discovery.seed_hosts=es-01,es-03
      - cluster.initial_master_nodes=es-01,es-02,es-03
      - node.roles=master,data,ingest
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms1g -Xmx1g}
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    volumes:
      - es_02_data:/usr/share/elasticsearch/data
    networks: [saas-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  es-03:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: saas-es-03
    restart: unless-stopped
    environment:
      - node.name=es-03
      - cluster.name=saas-es-cluster
      - discovery.seed_hosts=es-01,es-02
      - cluster.initial_master_nodes=es-01,es-02,es-03
      - node.roles=master,data,ingest
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms1g -Xmx1g}
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    volumes:
      - es_03_data:/usr/share/elasticsearch/data
    networks: [saas-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: saas-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=["http://es-01:9200","http://es-02:9200","http://es-03:9200"]
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
    ports: ["5601:5601"]
    depends_on:
      es-01: { condition: service_healthy }
    networks: [saas-network]



  # ===========================================
  # CAPA 2: CONFIG SERVER
  # ===========================================
  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: config-server
    image: saas-config-server:latest
    container_name: saas-config-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/config
      JAVA_OPTS: >-
        -Xms128m
        -Xmx256m
        -XX:+UseG1GC
        -XX:+UseContainerSupport
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8888:8888"
    volumes:
      - ./saas-config-repo:/config:ro
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================
  # CAPA 2: DISCOVERY SERVICE (EUREKA)
  # ===========================================
  discovery-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: discovery-service
    image: saas-discovery:latest
    container_name: saas-discovery
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888/
      EUREKA_INSTANCE_HOSTNAME: discovery-service
      JAVA_OPTS: >-
        -Xms128m
        -Xmx384m
        -XX:+UseG1GC
        -XX:+UseContainerSupport
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8761:8761"
    networks:
      - saas-network
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 50s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================
  # CAPA 3: AUTH SERVICE
  # ===========================================
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: auth-service
    image: saas-auth:latest
    container_name: saas-auth
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JAVA_OPTS: >-
        -Xms256m
        -Xmx512m
        -XX:+UseG1GC
        -XX:+UseContainerSupport
        -XX:MaxGCPauseMillis=100
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8082:8082"
    networks:
      - saas-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ===========================================
  # CAPA 3: SYSTEM SERVICE
  # ===========================================
  system-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: system-service
    image: saas-system:latest
    container_name: saas-system
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JAVA_OPTS: >-
        -Xms256m
        -Xmx512m
        -XX:+UseG1GC
        -XX:+UseContainerSupport
        -XX:MaxGCPauseMillis=100
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8083:8083"
    networks:
      - saas-network
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ===========================================
  # CAPA 4: GATEWAY SERVICE
  # ===========================================
  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway-service
    image: saas-gateway:latest
    container_name: saas-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JAVA_OPTS: >-
        -Xms256m
        -Xmx512m
        -XX:+UseG1GC
        -XX:+UseContainerSupport
        -Djava.security.egd=file:/dev/./urandom
        -Dreactor.netty.http.server.accessLogEnabled=true
    ports:
      - "8080:8080"
    networks:
      - saas-network
    depends_on:
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      system-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

# ===========================================
# NETWORKS
# ===========================================
networks:
  saas-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

# ===========================================
# VOLUMES
# ===========================================
volumes:
  mysql_data:    { driver: local }
  redis_data:    { driver: local }
  kafka_1_data:  { driver: local }
  kafka_2_data:  { driver: local }
  kafka_3_data:  { driver: local }
  es_01_data:    { driver: local }
  es_02_data:    { driver: local }
  es_03_data:    { driver: local }