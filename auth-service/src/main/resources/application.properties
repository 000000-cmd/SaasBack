spring.application.name=auth-service
# Config-server local por defecto. En Docker, SPRING_CONFIG_IMPORT (env var) sobrescribe.
spring.config.import=optional:configserver:http://localhost:8888/
# Sin SPRING_PROFILES_ACTIVE explicito (IntelliJ), usa "local" automaticamente.
# Docker setea SPRING_PROFILES_ACTIVE=docker y este default queda ignorado.
spring.profiles.default=local
