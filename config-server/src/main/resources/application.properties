server.port=8888
spring.application.name=config-server

# Modo "native" lee archivos del filesystem (no Git).
spring.profiles.active=native

# Donde buscar los .properties (en orden):
#   file:./saas-config-repo    -> IntelliJ con working dir = root del proyecto
#   file:../saas-config-repo   -> IntelliJ con working dir = config-server/ (default IntelliJ)
#   file:/config               -> Docker (volumen mount)
# En Docker, la env var SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS sobrescribe.
spring.cloud.config.server.native.search-locations=file:./saas-config-repo,file:../saas-config-repo,file:/config
